<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>p5.js 포트폴리오</title>
  <style>
    /* 전체 배경과 글꼴 설정 */
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f4f7f6;
      color: #333;
      text-align: center;
      margin: 0;
      padding: 40px 20px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    p {
      color: #7f8c8d;
      margin-bottom: 40px;
    }

    /* 2행 2열 그리드 구조 만들기 */
    .grid-container {
      display: grid;
      grid-template-columns: 1fr 1fr; /* 세로로 2줄을 의미해 */
      gap: 30px; /* 작품 사이의 간격 */
      max-width: 1300px;
      margin: 0 auto;
    }

    /* 각 작품이 들어갈 하얀색 네모 상자 디자인 */
    .grid-item {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.05); /* 그림자 효과 */
    }

    /* 상자 제목 */
    .grid-item h2 {
      font-size: 1.3rem;
      margin-top: 0;
      margin-bottom: 15px;
      border-bottom: 2px solid #ecf0f1;
      padding-bottom: 10px;
    }

    /* iframe: 다른 html 파일을 액자처럼 불러오는 태그 */
    iframe {
      width: 600px;
      height: 400px;
      border: none;
      background-color: #eee;
    }
  </style>
</head>
<body>

  <h1>미디어 아트 포트폴리오</h1>
  <p>정적 그래픽에서 시작하여 동적 상호작용으로 발전해가는 과정입니다.</p>

  <div class="grid-container">
    
    <div class="grid-item">
      <h2>과제 1 : 추상화</h2>
      <iframe src="assign1.html"></iframe>
    </div>

    <div class="grid-item">
      <h2>과제 4 : 시간에 따라 변하는 추상화</h2>
      <iframe src="assign4.html"></iframe>
    </div>

    <div class="grid-item">
      <h2>과제 2 : 캐리커처</h2>
      <iframe src="assign2.html"></iframe>
    </div>

    <div class="grid-item">
      <h2>과제 3 : 움직이는 캐리커처</h2>
      <iframe src="assign3.html"></iframe>
    </div>

  </div>

</body>
</html>
