<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <style>
    /* 여백 없이 캔버스만 딱 보이게 하는 설정 */
    body { padding: 0; margin: 0; overflow: hidden; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
</head>
<body>
  <script>
let c1, c2; // 색상 변수 선언

function setup() {
  createCanvas(600, 400);
  textSize(20);
  
  // 타원 색상 변화를 위한 시작/끝 색 지정
  c1 = color(50, 18, 122); // 기존 남색
  c2 = color(150, 50, 150); // 보라색
}

function draw() {
  background(200);
  
  stroke(255, 0, 0); 
  strokeWeight(2); 
  
  fill(255, 200, 200); 
  triangle(466, 361, 580, 370, 545, 290);
  
  line(50, 50, 350, 150); 
  line(41, 167, 252, 168); 
  line(470, 65, 545, 203); 
  line(514, 66, 597, 217); 
  
  // --- 1. 초록색 원 크기 변화 ---
  // sin()을 활용해 70 ~ 130 사이로 지름이 변함
  let greenSize = 100 + sin(frameCount * 0.05) * 30;
  fill(2, 120, 18); 
  ellipse(100, 100, greenSize, greenSize);
  
  noFill();
  arc(506, 54, 150, 100, radians(-176), radians(100)); 
  arc(510, 116, 150, 100, radians(45), radians(247));
  arc(506, 174, 150, 100, radians(-96), radians(145));
  arc(510, 230, 150, 100, radians(45), radians(247));
  arc(506, 290, 150, 100, radians(-96), radians(145));
  arc(510, 340, 150, 100, radians(45), radians(247));
  
  // 공통 회전 각도 변수 (하얀색 타원의 회전과 남색 타원의 색상 주기를 맞춤)
  let angle = frameCount * 0.02;
  
  // --- 3. 바탕 남색 타원 색상 변화 ---
  // abs(sin(angle))을 사용하면 각도가 180도(PI) 돌 때마다 0 -> 1 -> 0으로 값이 변함
  let colorAmt = abs(sin(angle));
  let currentColor = lerpColor(c1, c2, colorAmt);
  fill(currentColor); 
  ellipse(302, 200, 400, 260);
  
  // --- 2. 하얀색 타원 제자리 회전 ---
  push(); // 현재 좌표계를 저장
  translate(302, 200); // 타원의 중심을 0,0(원점)으로 이동
  rotate(angle); // 계산된 각도만큼 회전
  fill(255, 255, 255); 
  ellipse(0, 0, 100, 150); // 원점에서 타원을 그림
  pop(); // 원래 좌표계로 복구 (이후 그려지는 도형에 회전이 안 먹히게 함)
  
  fill(255, 255, 123); // 노란색 원
  ellipse(302, 200, 50, 50);
  
  fill(255, 255, 255); // 점 4개
  point(384, 219);
  point(361, 188);
  point(151, 168);
  point(231, 231);
  
  fill(0, 255, 255); // 가운데의 민트색 사각형
  rect(234, 284, 100, 200);
  
  fill(255, 255, 240); // 좌측하단 하얀 사각형
  rect(191, 321, 50, 100);
  
  fill(100, 210, 220); // 우측 하늘색 사각형
  rect(325, 346, 100, 150);
  
  fill(0, 0, 120); // 모서리가 둥근 남색 사각형
  square(40, 250, 80, 15);
  
  // --- 이전 단계: 우측 상단 도형 대각선 이동 ---
  let moveAmt = (sin(frameCount * 0.05) + 1) / 2; 
  let moveX = moveAmt * 75;  
  let moveY = moveAmt * 138; 
  
  fill(250, 100, 100); 
  ellipse(485 + moveX, 57 + moveY, 100, 40); 
  
  fill(255, 255, 130); 
  arc(486 + moveX, 48 + moveY, 50, 50, -PI, 0); 
}
  function keyPressed(){
  if (key==='s'){
    saveGif('p5.js_HW4', 10);
  }
}
  </script>
</body>
</html>
