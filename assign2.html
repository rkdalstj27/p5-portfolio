<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <style>
    /* 여백 없이 캔버스만 딱 보이게 하는 설정 */
    body { padding: 0; margin: 0; overflow: hidden; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
</head>
<body>
  <script>
function setup() {
  createCanvas(600, 400);
}

function draw() {
  background(220);
  

  // fill(0); // 커서 X, Y 좌표 표시
  // text("X: " + mouseX + "  Y: " + mouseY, 0, 20); 
  
  strokeWeight(2);    
  fill(60, 40, 30); // 갈색
  ellipse(300, 160, 170, 200); // 뒷머리 (190 -> 160)
  
  fill(255, 245, 215);
  rect(180, 263, 50, 110, 15); // 왼쪽 팔 (293 -> 263)
  rect(370, 263, 50, 110, 15);
  
  fill(20, 60, 10); // 초록색
  rect(219, 263, 160, 100); // 몸통 (293 -> 263)
  
  fill(255, 218, 185);
  rect(275, 165, 50, 100); // 목 (195 -> 165)
  arc(300, 263, 100, 40, 0, PI); // 목 아래 (293 -> 263)
  ellipse(300, 160, 150, 150); // 얼굴 (190 -> 160)
  
  fill(0);
  ellipse(270, 160, 10, 10); // 왼쪽눈 (190 -> 160)
  ellipse(330, 160, 10, 10); // 오른쪽눈 (190 -> 160)
  ellipse(261, 173, 2, 2); // 눈물점 (203 -> 173)
  ellipse(338, 185, 1, 1); // 볼 점 (215 -> 185)
  
  //안경
  noFill(); 
  stroke(0);
  
  arc(265, 157, 50, 40, 0, PI);
  arc(335, 157, 50, 40, 0, PI);
  line(290, 157, 310, 157);
  
  fill(255);           
  arc(300, 188, 50, 40, 0, PI); // 입 모양 (218 -> 188)
  line(275, 188, 325, 188); // 입 위쪽 직선 (218 -> 188)
  line(278, 197, 321, 197); // 이빨 (227 -> 197)
  
  fill(60, 40, 30); 
  arc(247, 95, 110, 100, radians(-15), radians(145)); // 머리카락
  arc(353, 95, 110, 100, radians(35), radians(195)); // 머리카락
  
  //흰 건반 (8개, 너비 50씩, x=100 ~ 500)
  fill(255);
  rect(100, 330, 50, 70); // 도
  rect(150, 330, 50, 70); // 레
  rect(200, 330, 50, 70); // 미
  rect(250, 330, 50, 70); // 파
  rect(300, 330, 50, 70); // 솔
  rect(350, 330, 50, 70); // 라
  rect(400, 330, 50, 70); // 시
  rect(450, 330, 50, 70); // 도

  //검은 건반
  fill(0);
  rect(135, 355, 30, 45); // 도# (150-15)
  rect(185, 355, 30, 45); // 레# (200-15)
  rect(285, 355, 30, 45); // 파# (300-15)
  rect(335, 355, 30, 45); // 솔# (350-15)
  rect(385, 355, 30, 45); // 라# (400-15)
}
  </script>
</body>
</html>
